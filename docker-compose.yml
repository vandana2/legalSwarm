version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: legalswarm-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql://legalswarm:password@db:5432/legalswarm
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - legalswarm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: legalswarm-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - legalswarm-network

  db:
    image: postgres:15-alpine
    container_name: legalswarm-db
    environment:
      - POSTGRES_USER=legalswarm
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=legalswarm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - legalswarm-network

  redis:
    image: redis:7-alpine
    container_name: legalswarm-redis
    ports:
      - "6379:6379"
    networks:
      - legalswarm-network

volumes:
  postgres_data:

networks:
  legalswarm-network:
    driver: bridge
